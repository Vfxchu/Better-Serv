<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Better Serv Properties — Premium Properties in Dubai & India</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --bg-alt: #f7f8fa;
        --bg-dark: #0a0a0f;
        --bg-card: #ffffff;
        --blue: #0055ff;
        --blue-hover: #0044cc;
        --blue-light: rgba(0, 85, 255, 0.08);
        --blue-glow: rgba(0, 85, 255, 0.25);
        --gold: #c9a84c;
        --text: #1a1a1a;
        --text-mid: #555;
        --text-light: #888;
        --border: #e8e8e8;
        --radius: 16px;
        --radius-sm: 10px;
        --radius-pill: 50px;
        --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 16px 64px rgba(0, 0, 0, 0.12);
        --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.07);
        --font-body: "DM Sans", sans-serif;
        --font-display: "Playfair Display", serif;
        --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: var(--font-body);
        color: var(--text);
        background: var(--bg);
        overflow-x: hidden;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      img {
        max-width: 100%;
        display: block;
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      button {
        font-family: var(--font-body);
        cursor: pointer;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes scaleIn {
        from {
          opacity: 0;
          transform: scale(0.92);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes heroSlideIn {
        from {
          opacity: 0;
          transform: scale(1.06);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .reveal {
        opacity: 0;
        transform: translateY(28px);
        transition:
          opacity 0.7s var(--ease),
          transform 0.7s var(--ease);
      }
      .reveal.fl {
        transform: translateX(-28px);
      }
      .reveal.fr {
        transform: translateX(28px);
      }
      .reveal.fs {
        transform: scale(0.9);
      }
      .reveal.vis {
        opacity: 1;
        transform: translate(0) scale(1);
      }
      .reveal.d1 {
        transition-delay: 0.1s;
      }
      .reveal.d2 {
        transition-delay: 0.2s;
      }
      .reveal.d3 {
        transition-delay: 0.3s;
      }
      .reveal.d4 {
        transition-delay: 0.4s;
      }
      .reveal.d5 {
        transition-delay: 0.5s;
      }
      .reveal.d6 {
        transition-delay: 0.6s;
      }
      .reveal.d7 {
        transition-delay: 0.7s;
      }
      .reveal.d8 {
        transition-delay: 0.8s;
      }
      .page {
        animation: fadeUp 0.45s ease forwards;
      }

      /* ─── HEADER ─── */
      .cap-hdr {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 9000;
        background: transparent;
        padding: 0 48px;
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        transition: background 0.35s ease, box-shadow 0.35s ease;
        border: none;
        border-radius: 0;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        box-shadow: none;
      }
      .cap-hdr.scrolled {
        background: rgba(10, 10, 15, 0.97);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      }
      .cap-hdr .logo {
        display: flex;
        align-items: center;
        margin-right: auto;
      }
      .cap-hdr .logo img {
        height: 140px;
        width: auto;
        object-fit: contain;
        padding: 0;
        transition: transform 0.3s ease;
      }
      .cap-hdr .logo:hover img {
        transform: scale(1.02);
      }
      .cap-hdr .dnav {
        display: flex;
        gap: 4px;
      }
      .cap-hdr .dnav a {
        color: rgba(255, 255, 255, 0.65);
        font-size: 0.78rem;
        font-weight: 500;
        padding: 8px 13px;
        border-radius: var(--radius-pill);
        transition: all 0.25s;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }
      .cap-hdr .dnav a:hover,
      .cap-hdr .dnav a.active {
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
      }
      .cap-hdr .cta-btn {
        background: var(--blue);
        color: #fff;
        border: none;
        border-radius: var(--radius-pill);
        padding: 9px 20px;
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        transition: all 0.25s;
        white-space: nowrap;
      }
      .cap-hdr .cta-btn:hover {
        background: var(--blue-hover);
        transform: translateY(-1px);
      }

      .mob-bar {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 9000;
        background: rgba(10, 10, 15, 0.96);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        justify-content: space-around;
        padding: 8px 0 max(8px, env(safe-area-inset-bottom));
        border-top: 1px solid rgba(255, 255, 255, 0.07);
      }
      .mob-bar a {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        color: rgba(255, 255, 255, 0.4);
        font-size: 0.6rem;
        font-weight: 500;
        min-width: 48px;
        min-height: 44px;
        justify-content: center;
        transition: color 0.2s;
      }
      .mob-bar a svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
      }
      .mob-bar a.active {
        color: var(--blue);
      }
      @media (max-width: 768px) {
        .mob-bar {
          display: flex !important;
        }
        .cap-hdr .dnav,
        .cap-hdr .cta-btn {
          display: none !important;
        }
        .cap-hdr {
          padding: 12px 24px;
          max-width: 100%;
          width: 100%;
          left: 0;
          right: 0;
          transform: none;
          justify-content: center;
          background: rgba(10, 10, 15, 0.1);
        }
        .cap-hdr.scrolled {
          background: rgba(10, 10, 15, 0.98);
        }
        .cap-hdr .logo {
          margin-right: 0;
          justify-content: center;
          width: 100%;
        }
        .cap-hdr .logo img {
          height: 80px;
        }
        .hero-content {
          text-align: center;
          padding: 180px 20px 80px;
        }
        .hero-content .section-tag {
          justify-content: center;
        }
        .hero-content p {
          margin: 0 auto 32px;
        }
        .hero-btns {
          justify-content: center;
        }
        .section {
          padding: 60px 20px;
        }
      }

      /* ─── BUTTONS ─── */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-body);
        font-weight: 700;
        font-size: 0.88rem;
        padding: 14px 30px;
        border-radius: var(--radius-sm);
        border: none;
        cursor: pointer;
        transition: all 0.35s var(--ease);
        min-height: 48px;
        letter-spacing: 0.01em;
      }
      .btn-blue {
        background: var(--blue);
        color: #fff;
      }
      .btn-blue:hover {
        background: var(--blue-hover);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px var(--blue-glow);
      }
      .btn-dark {
        background: var(--bg-dark);
        color: #fff;
      }
      .btn-dark:hover {
        background: #222;
        transform: translateY(-2px);
      }
      .btn-outline {
        background: transparent;
        color: #fff;
        border: 1.5px solid rgba(255, 255, 255, 0.3);
      }
      .btn-outline:hover {
        border-color: #fff;
        background: rgba(255, 255, 255, 0.06);
      }
      .btn-outline-dark {
        background: transparent;
        color: var(--text);
        border: 1.5px solid var(--border);
      }
      .btn-outline-dark:hover {
        border-color: var(--blue);
        color: var(--blue);
      }
      .btn-icon {
        font-size: 1rem;
        transition: transform 0.2s;
      }
      .btn:hover .btn-icon {
        transform: translateX(3px);
      }

      /* ─── SECTIONS ─── */
      .section {
        padding: 100px 24px;
      }
      .section-inner {
        max-width: 1140px;
        margin: 0 auto;
      }
      .section-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--blue);
        font-weight: 700;
        font-size: 0.72rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      .section-tag::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--blue);
        display: inline-block;
      }
      .section-title {
        font-family: var(--font-display);
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.15;
        margin-bottom: 16px;
      }
      .section-subtitle {
        color: var(--text-mid);
        font-size: 1.02rem;
        line-height: 1.7;
        max-width: 560px;
      }

      /* ─── HERO ─── */
      .hero {
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        overflow: hidden;
        background: var(--bg-dark);
      }
      .hero-slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        background-size: cover;
        background-position: center;
        transition: none;
      }
      .hero-slide::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to right,
          rgba(0, 0, 0, 0.85) 0%,
          rgba(0, 0, 0, 0.4) 50%,
          rgba(0, 0, 0, 0.1) 100%
        );
      }
      @media (max-width: 768px) {
        .hero-slide::after {
          background: rgba(0, 0, 0, 0.65);
        }
      }
      .hero-slide.active {
        opacity: 1;
        animation: heroSlideIn 1s ease forwards;
      }
      .hero-dots {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        z-index: 10;
      }
      .hero-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.5);
        background: transparent;
        cursor: pointer;
        transition: all 0.3s;
        padding: 0;
      }
      .hero-dot.active {
        background: #fff;
        border-color: #fff;
        width: 28px;
        border-radius: 10px;
      }
      .hero-content {
        position: relative;
        z-index: 5;
        max-width: 1140px;
        width: 100%;
        padding: 160px 48px 100px;
        margin: 0 auto;
        text-align: left;
      }
      .hero-content .section-tag {
        color: var(--gold);
        justify-content: flex-start;
      }
      .hero-content .section-tag::before {
        background: var(--gold);
      }
      .hero-content h1 {
        font-family: var(--font-display);
        font-size: clamp(2.4rem, 6vw, 4rem);
        font-weight: 800;
        color: #fff;
        line-height: 1.08;
        letter-spacing: -0.03em;
        margin-bottom: 20px;
      }
      .hero-content h1 span {
        color: var(--blue);
      }
      .hero-content p {
        color: rgba(255, 255, 255, 0.8);
        font-size: 1.1rem;
        line-height: 1.7;
        max-width: 580px;
        margin: 0 0 40px;
      }
      .hero-btns {
        display: flex;
        gap: 12px;
        justify-content: flex-start;
        flex-wrap: wrap;
      }

      /* ─── PAGE BANNER ─── */
      .page-banner {
        position: relative;
        padding: 160px 24px 80px;
        background: var(--bg-dark);
        text-align: center;
        overflow: hidden;
      }
      .page-banner::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            circle at 30% 50%,
            rgba(0, 85, 255, 0.1) 0%,
            transparent 60%
          ),
          radial-gradient(
            circle at 80% 20%,
            rgba(201, 168, 76, 0.06) 0%,
            transparent 50%
          );
      }
      .page-banner .section-tag {
        justify-content: center;
        position: relative;
      }
      .page-banner h1 {
        font-family: var(--font-display);
        font-size: clamp(2rem, 5vw, 3.2rem);
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.02em;
        position: relative;
      }
      .page-banner p {
        color: rgba(255, 255, 255, 0.5);
        position: relative;
        margin-top: 12px;
        font-size: 0.95rem;
      }

      /* ─── TABS ─── */
      .tab-nav {
        display: inline-flex;
        background: var(--bg-alt);
        padding: 6px;
        border-radius: var(--radius-pill);
        margin-bottom: 40px;
        border: 1px solid var(--border);
      }
      .tab-btn {
        padding: 10px 28px;
        font-size: 0.88rem;
        font-weight: 700;
        border-radius: var(--radius-pill);
        border: none;
        background: transparent;
        color: var(--text-mid);
        cursor: pointer;
        transition: all 0.3s var(--ease);
      }
      .tab-btn.active {
        background: var(--blue);
        color: #fff;
        box-shadow: var(--shadow-sm);
      }

      /* ─── LOGO MARQUEE ─── */
      .marquee-container {
        width: 100%;
        overflow: hidden;
        padding: 40px 0;
        mask-image: linear-gradient(
          to right,
          transparent,
          black 20%,
          black 80%,
          transparent
        );
        -webkit-mask-image: linear-gradient(
          to right,
          transparent,
          black 20%,
          black 80%,
          transparent
        );
      }
      .marquee-track {
        display: flex;
        gap: 60px;
        width: max-content;
        animation: marquee 40s linear infinite;
        will-change: transform;
      }
      .marquee-track .dev-card {
        flex-shrink: 0;
        width: 180px;
        background: transparent;
        border: none;
        padding: 0;
      }
      .marquee-track img {
        height: 60px;
        width: 100%;
        filter: grayscale(1) invert(1) brightness(0.8) opacity(0.5);
        transition: all 0.3s var(--ease);
        object-fit: contain;
      }
      .marquee-track .dev-card:hover img {
        filter: grayscale(0) invert(0) brightness(1) opacity(1);
        transform: translateY(-5px);
      }
      .marquee-track p {
        font-size: 0.7rem;
        margin-top: 8px;
        color: var(--text-mid);
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0.5;
      }
      .marquee-track .dev-card:hover p {
        opacity: 1;
        color: var(--blue);
      }
      .prop-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 24px;
      }
      .prop-card {
        background: var(--bg-card);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow-card);
        transition:
          transform 0.35s var(--ease),
          box-shadow 0.35s var(--ease);
      }
      .prop-card:hover {
        transform: translateY(-6px);
        box-shadow: var(--shadow-lg);
      }
      .prop-card .iw {
        position: relative;
        overflow: hidden;
        height: 220px;
      }
      .prop-card .iw img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s;
      }
      .prop-card:hover .iw img {
        transform: scale(1.06);
      }
      .prop-card .badge-tag {
        position: absolute;
        top: 14px;
        left: 14px;
        background: var(--blue);
        color: #fff;
        font-size: 0.68rem;
        font-weight: 700;
        padding: 5px 12px;
        border-radius: var(--radius-pill);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .prop-card .bd {
        padding: 20px 22px;
      }
      .prop-card .bd h4 {
        font-size: 1.05rem;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .prop-card .loc {
        font-size: 0.82rem;
        color: var(--text-light);
        display: flex;
        align-items: center;
        gap: 4px;
        margin-bottom: 10px;
      }
      .prop-card .meta {
        display: flex;
        gap: 16px;
        margin-bottom: 14px;
        font-size: 0.76rem;
        color: var(--text-light);
      }
      .prop-card .rw {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .prop-card .price {
        font-weight: 800;
        font-size: 1.12rem;
        color: var(--blue);
      }
      .prop-card .vb {
        background: var(--blue-light);
        color: var(--blue);
        border: none;
        border-radius: var(--radius-sm);
        padding: 8px 16px;
        font-size: 0.78rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.25s;
        font-family: var(--font-body);
      }
      .prop-card .vb:hover {
        background: var(--blue);
        color: #fff;
      }

      .slider-wrap {
        position: relative;
      }
      .slider-track {
        display: flex;
        gap: 20px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        padding: 20px 4px;
        scrollbar-width: none;
      }
      .slider-track::-webkit-scrollbar {
        display: none;
      }
      .slider-track .prop-card {
        min-width: 300px;
        flex-shrink: 0;
        scroll-snap-align: start;
      }
      .sb {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        border: 1.5px solid var(--border);
        background: rgba(255, 255, 255, 0.95);
        color: var(--text);
        font-size: 1.1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow-md);
        transition: all 0.25s;
        backdrop-filter: blur(8px);
      }
      .sb:hover {
        background: var(--blue);
        color: #fff;
        border-color: var(--blue);
      }
      .sb.l {
        left: -12px;
      }
      .sb.r {
        right: -12px;
      }

      .feat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 24px;
      }
      .fc {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 40px 32px;
        transition: all 0.4s var(--ease);
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }
      .fc::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: var(--blue);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.4s var(--ease);
      }
      .fc:hover::before {
        transform: scaleX(1);
      }
      .fc:hover {
        transform: translateY(-8px);
        box-shadow: var(--shadow-lg);
        border-color: transparent;
      }
      .fc .ib {
        width: 60px;
        height: 60px;
        border-radius: 16px;
        background: var(--blue-light);
        color: var(--blue);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        transition: all 0.3s;
        border: 1px solid rgba(0, 85, 255, 0.1);
      }
      .fc:hover .ib {
        background: var(--blue);
        color: #fff;
        transform: rotate(-4deg) scale(1.05);
      }
      .fc .ib svg {
        width: 28px;
        height: 28px;
        stroke: currentColor;
        stroke-width: 1.8;
      }
      .fc h3 {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 12px;
        color: var(--text);
      }
      .fc p {
        color: var(--text-mid);
        font-size: 0.95rem;
        line-height: 1.7;
      }

      .fcd {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius);
        padding: 40px 32px;
        transition: all 0.4s var(--ease);
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .fcd:hover {
        background: rgba(255, 255, 255, 0.06);
        transform: translateY(-8px);
        border-color: rgba(255, 255, 255, 0.15);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      }
      .fcd .ib {
        width: 64px;
        height: 64px;
        background: rgba(0, 85, 255, 0.15);
        color: var(--blue);
        margin-bottom: 24px;
        border-radius: 18px;

      /* ═══ ROUTER ═══ */
      let curPg = "home",
        hInt = null,
        curSl = 0;

      function nav(page, sub = "buy") {
        if (hInt) {
          clearInterval(hInt);
          hInt = null;
        }
        curPg = page;
        window.scrollTo({ top: 0, behavior: "instant" });
        const app = document.getElementById("app");
        switch (page) {
          case "home":
            app.innerHTML = homePg();
            startSlider();
            break;
          case "about":
            app.innerHTML = aboutPg();
            break;
          case "dubai":
            app.innerHTML = propPg("dubai", sub);
            break;
          case "india":
            app.innerHTML = propPg("india", sub);
            break;
          case "contact":
            app.innerHTML = contactPg();
            break;
        }
        document
          .querySelectorAll(".dnav a,.mob-bar a")
          .forEach((a) =>
            a.classList.toggle("active", a.dataset.page === page),
          );
        initPg();
      }

      function initPg() {
        const obs = new IntersectionObserver(
          (es) => {
            es.forEach((e) => {
              if (e.isIntersecting) {
                e.target.classList.add("vis");
                obs.unobserve(e.target);
              }
            });
          },
          { threshold: 0.12 },
        );
        document.querySelectorAll(".reveal").forEach((el) => obs.observe(el));

        const bar = document.getElementById("statsBar");
        if (bar) {
          let done = false;
          const so = new IntersectionObserver(
            ([e]) => {
              if (e.isIntersecting && !done) {
                done = true;
                bar.querySelectorAll(".stat-num").forEach((el) => {
                  const tgt = +el.dataset.target,
                    sfx = el.dataset.suffix,
                    step = Math.ceil(tgt / 125);
                  let c = 0;
                  const id = setInterval(() => {
                    c += step;
                    if (c >= tgt) {
                      el.textContent = tgt + sfx;
                      clearInterval(id);
                    } else el.textContent = c + sfx;
                  }, 16);
                });
                so.unobserve(bar);
              }
            },
            { threshold: 0.3 },
          );
          so.observe(bar);
        }

        const tl = document.getElementById("timeline");
        if (tl) {
          const to = new IntersectionObserver(
            ([e]) => {
              if (e.isIntersecting) {
                tl.querySelectorAll("[data-line]").forEach((l, i) =>
                  setTimeout(() => l.classList.add("vis"), 300 + i * 200),
                );
                to.unobserve(tl);
              }
            },
            { threshold: 0.3 },
          );
          to.observe(tl);
        }
      }

      function startSlider() {
        curSl = 0;
        hInt = setInterval(() => {
          curSl = (curSl + 1) % HS.length;
          updSlide();
        }, 5000);
      }
      function goSlide(i) {
        curSl = i;
        updSlide();
      }
      function updSlide() {
        document
          .querySelectorAll(".hero-slide")
          .forEach((s, i) => s.classList.toggle("active", i === curSl));
        document
          .querySelectorAll(".hero-dot")
          .forEach((d, i) => d.classList.toggle("active", i === curSl));
      }
      function ss(id, dir) {
        const el = document.getElementById(id);
        if (el) el.scrollBy({ left: dir * 340, behavior: "smooth" });
      }

      function openM(t, s) {
        document.getElementById("mT").textContent = "Enquire: " + t;
        document.getElementById("mS").textContent = s;
        document.getElementById("mF").style.display = "block";
        document.getElementById("mOk").style.display = "none";
        document.getElementById("eqModal").classList.add("open");
      }
      function closeM() {
        document.getElementById("eqModal").classList.remove("open");
      }
      function subM() {
        document.getElementById("mF").style.display = "none";
        document.getElementById("mOk").style.display = "block";

        .getElementById("eqModal")
        .addEventListener("click", function (e) {
